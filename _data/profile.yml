short_bio: >-
  <p>
    Hi! I am an incoming Ph.D. student in Computational Biology (CPCB) at Carnegie Mellon University, affiliated with the School of Computer Science.
    My research is motivated by a central question: how can we extract reliable biological insight from noisy and incomplete data?
  </p>
  <p>
    During my military service as a medic, I witnessed how clinical decisions were often made under uncertainty due to limited and imperfect data.
    This experience led me to pursue computational approaches, adding a second major in Computer Science to build a rigorous foundation in algorithms and statistical modeling.
  </p>
  <p>
    At the University of North Carolina at Chapel Hill, I worked in Prof. Terry Fureys lab on epigenomic method development.
    There, I developed WAD, a wavelet-based framework for bulk ATAC-seq deconvolution that addresses the intrinsic sparsity and noise of chromatin accessibility data.
    More broadly, I am interested in building robust and interpretable computational methods for understanding gene regulation from complex genomic data.
  </p>

